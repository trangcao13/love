<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date With Me?</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #fff0f3;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Floating hearts background */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            color: #ff8fa3;
            font-size: 20px;
            animation: floatUp 8s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Big heart animation */
        .big-heart {
            font-size: 80px;
            animation: heartbeat 1.5s ease-in-out infinite;
            margin-bottom: 20px;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #d6336c;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(214, 51, 108, 0.2);
        }

        .subtitle {
            color: #f06595;
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 80px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .btn-yes {
            background: #d6336c;
            color: white;
            z-index: 5;
        }

        .btn-yes:hover {
            background: #c2255c;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(214, 51, 108, 0.3);
        }

        .btn-no {
            background: #868e96;
            color: white;
            position: absolute;
            z-index: 100;
            transition: transform 0.15s ease-out;
        }

        /* Success message */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 243, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .success-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-heart {
            font-size: 100px;
            animation: heartbeat 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .success-text {
            font-family: 'Pacifico', cursive;
            font-size: 3rem;
            color: #d6336c;
            margin-bottom: 20px;
        }

        .success-sub {
            font-size: 1.3rem;
            color: #f06595;
            font-weight: 600;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 1001;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .big-heart { font-size: 60px; }
            .btn { padding: 12px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Floating Hearts Background -->
    <div class="heart-bg" id="heartBg"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="big-heart">💖</div>
        <h1>Do you want to have a date with me?</h1>
        <p class="subtitle">Hãy trả lời từ trái tim nhé... 💕</p>

        <div class="button-group" id="buttonGroup">
            <button class="btn btn-yes" id="btnYes" onclick="sayYes()">Yes 💘</button>
            <button class="btn btn-no" id="btnNo">No 💔</button>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-heart">💞</div>
        <div class="success-text">Yay! I knew it! 💖</div>
        <div class="success-sub">Cuộc hẹn đầu tiên của chúng ta sẽ thật tuyệt vời!</div>
    </div>

    <script>
        // Generate floating hearts
        const heartBg = document.getElementById('heartBg');
        const heartEmojis = ['💕', '💖', '💗', '💓', '💝', '❤️', '🧡', '💛'];
        
        for (let i = 0; i < 30; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (15 + Math.random() * 25) + 'px';
            heart.style.animationDuration = (6 + Math.random() * 6) + 's';
            heart.style.animationDelay = Math.random() * 8 + 's';
            heartBg.appendChild(heart);
        }

        // The "No" button runs away
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');
        const buttonGroup = document.getElementById('buttonGroup');
        let isEscaping = false;

        function moveButtonAway(e) {
            const btnRect = btnNo.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;
            
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const distance = Math.sqrt(
                Math.pow(mouseX - btnCenterX, 2) + 
                Math.pow(mouseY - btnCenterY, 2)
            );
            
            const triggerDistance = 200;
            
            if (distance < triggerDistance) {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                
                const btnWidth = btnRect.width;
                const btnHeight = btnRect.height;
                
                // Calculate direction away from mouse
                let angle = Math.atan2(btnCenterY - mouseY, btnCenterX - mouseX);
                
                // Add some randomness to make it unpredictable
                angle += (Math.random() - 0.5) * 1;
                
                const moveDistance = 150 + Math.random() * 100;
                
                let newX = btnCenterX + Math.cos(angle) * moveDistance - btnWidth / 2;
                let newY = btnCenterY + Math.sin(angle) * moveDistance - btnHeight / 2;
                
                // Keep within viewport
                newX = Math.max(10, Math.min(viewportWidth - btnWidth - 10, newX));
                newY = Math.max(10, Math.min(viewportHeight - btnHeight - 10, newY));
                
                btnNo.style.position = 'fixed';
                btnNo.style.left = newX + 'px';
                btnNo.style.top = newY + 'px';
                
                // Change text sometimes
                const noTexts = ['No 💔', 'Really? 😢', 'Think again! 🤔', 'Are you sure? 😰', 'Nooo! 😭', 'Please? 🥺', 'Don\'t do it! 😱'];
                if (Math.random() > 0.7) {
                    btnNo.textContent = noTexts[Math.floor(Math.random() * noTexts.length)];
                }
                
                // Make Yes button bigger
                const currentScale = parseFloat(btnYes.dataset.scale || 1);
                if (currentScale < 2.5) {
                    btnYes.dataset.scale = currentScale + 0.1;
                    btnYes.style.transform = `scale(${currentScale + 0.1})`;
                    btnYes.style.padding = (15 + currentScale * 5) + 'px ' + (40 + currentScale * 10) + 'px';
                }
            }
        }

        // Also move on click attempt
        btnNo.addEventListener('click', function(e) {
            e.preventDefault();
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const btnRect = btnNo.getBoundingClientRect();
            
            let newX = Math.random() * (viewportWidth - btnRect.width - 20) + 10;
            let newY = Math.random() * (viewportHeight - btnRect.height - 20) + 10;
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = newX + 'px';
            btnNo.style.top = newY + 'px';
        });

        btnNo.addEventListener('mouseover', moveButtonAway);
        document.addEventListener('mousemove', moveButtonAway);

        // Success handler
        function sayYes() {
            const overlay = document.getElementById('successOverlay');
            overlay.classList.add('active');
            
            // Create confetti
            const colors = ['#d6336c', '#ff8fa3', '#ff6b6b', '#f06595', '#fcc2d7', '#fff0f6'];
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = (5 + Math.random() * 10) + 'px';
                    confetti.style.height = (5 + Math.random() * 10) + 'px';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }
    </script>

</body>
</html>
